<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; }
    * { box-sizing: border-box; }
    input::placeholder { color: #A79F91; }
    input:focus { outline: none; }
  </style>
</helmet>

<div style="position:relative; min-height:100vh; width:100%; background: radial-gradient(circle at 88% -8%, rgba(217,164,65,0.20), transparent 42%), radial-gradient(circle at -8% 106%, rgba(138,90,46,0.12), transparent 40%), #FBF9F5; font-family:'IBM Plex Sans', sans-serif; overflow-x:hidden;">

  <!-- decorative motif: left (circular-economy cycle) -->
  <div style="position:absolute; left:-50px; top:15%; z-index:0; pointer-events:none;">
    <div style="position:relative; width:220px; height:220px;">
      <div style="position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle at 42% 38%, rgba(95,138,90,0.16), transparent 62%);"></div>
      <div style="position:absolute; left:38px; top:38px; width:144px; height:144px; border-radius:50%; border:1.5px dashed rgba(138,90,46,0.18);"></div>
      <svg width="78" height="78" viewBox="0 0 24 24" fill="none" style="position:absolute; left:71px; top:71px;">
        <path d="M4.5 10a7.5 7.5 0 0 1 12.8-3.7L20 9" stroke="#5F8A5A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M20 4.6V9.2h-4.6" stroke="#5F8A5A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M19.5 14a7.5 7.5 0 0 1-12.8 3.7L4 15" stroke="#D9A441" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M4 19.4V14.8h4.6" stroke="#D9A441" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </div>
  </div>

  <!-- decorative motif: right (leaf in orbit) -->
  <div style="position:absolute; right:-40px; top:52%; z-index:0; pointer-events:none;">
    <div style="position:relative; width:180px; height:180px;">
      <div style="position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle at 55% 45%, rgba(217,164,65,0.15), transparent 62%);"></div>
      <div style="position:absolute; left:32px; top:32px; width:116px; height:116px; border-radius:50%; border:1.5px solid rgba(95,138,90,0.14);"></div>
      <svg width="58" height="58" viewBox="0 0 24 24" fill="none" style="position:absolute; left:61px; top:61px;"><path d="M12 21c-1.2-6.5 1-11.5 8.5-13.5C19.3 14.2 17 18.8 12 21z" fill="rgba(95,138,90,0.14)" stroke="#5F8A5A" stroke-width="1.4" stroke-linejoin="round"></path><path d="M12 21c0-4.3 1.6-8 5-10.2" stroke="#5F8A5A" stroke-width="1.4" stroke-linecap="round"></path></svg>
    </div>
  </div>

  <!-- nav -->
  <div style="position:relative; z-index:1; display:flex; align-items:center; justify-content:space-between; padding: 24px 6vw;">
    <a href="Landing.dc.html" style="text-decoration:none; display:flex; align-items:center;">
      <img src="assets/mx-logo.png" alt="Matxchange" style="height:30px; width:auto; display:block;"></img>
    </a>
    <div style="font-size:14px; color:#6B655C;">New here? <a href="Signup.dc.html" style="color:#1C1A17; font-weight:600; text-decoration:none;">Sign up</a></div>
  </div>

  <!-- content -->
  <div style="position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 78px); padding: 24px 20px 60px; opacity:{{ mountedOpacity }}; transform:{{ mountedTransform }}; transition:opacity 0.6s ease, transform 0.6s ease;">

    <div style="text-align:center; margin-bottom:32px;">
      <h1 style="font-family:'Space Grotesk', sans-serif; font-size:clamp(28px,5.5vw,36px); font-weight:600; color:#1C1A17; margin:0 0 8px; letter-spacing:-0.02em;">Welcome back</h1>
      <div style="font-size:15px; color:#6B655C;">Log in to continue to Matxchange</div>
    </div>

    <!-- card -->
    <div style="width:100%; max-width:440px; background:#FFFFFF; border:1px solid #E7E1D6; border-radius:20px; box-shadow: 0 24px 60px -20px rgba(28,26,23,0.14); padding:clamp(24px,5vw,36px) clamp(20px,5vw,32px);">

      <form style="display:flex; flex-direction:column; gap:16px;" onSubmit="{{ handleSubmit }}">

        <div>
          <label style="display:block; font-size:13px; font-weight:600; color:#1C1A17; margin-bottom:7px;">Email address</label>
          <div style="display:flex; align-items:center; gap:11px; background:#F7F4EE; border:1px solid #E7E1D6; border-radius:12px; padding:11px 13px; style-focus:{border-color:#8A5A2E}">
            <span style="width:32px; height:32px; border-radius:9px; background:#F1E7D6; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="5" width="18" height="14" rx="2.5" stroke="#8A5A2E" stroke-width="1.7"></rect>
                <path d="M4 7L12 13L20 7" stroke="#8A5A2E" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </span>
            <input type="email" placeholder="jane@example.com" style="border:none; background:transparent; width:100%; font-size:15px; color:#1C1A17; font-family:'IBM Plex Sans', sans-serif;"></input>
          </div>
        </div>

        <div>
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:7px;">
            <label style="font-size:13px; font-weight:600; color:#1C1A17;">Password</label>
            <a href="ForgotPassword.dc.html" style="font-size:13px; color:#8A5A2E; text-decoration:none; font-weight:500;" style-hover="{color:#6E4522}">Forgot password?</a>
          </div>
          <div style="display:flex; align-items:center; gap:11px; background:#F7F4EE; border:1px solid #E7E1D6; border-radius:12px; padding:11px 13px;">
            <span style="width:32px; height:32px; border-radius:9px; background:#E5EDE3; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                <rect x="4" y="10" width="16" height="10" rx="2.5" stroke="#5F8A5A" stroke-width="1.7"></rect>
                <path d="M7.5 10V7.5a4.5 4.5 0 0 1 9 0V10" stroke="#5F8A5A" stroke-width="1.7"></path>
                <circle cx="12" cy="15" r="1.5" fill="#5F8A5A"></circle>
              </svg>
            </span>
            <input type="{{ passwordType }}" placeholder="••••••••" style="border:none; background:transparent; width:100%; font-size:15px; color:#1C1A17; font-family:'IBM Plex Sans', sans-serif;"></input>
            <button type="button" onClick="{{ togglePassword }}" style="border:none; background:transparent; color:#6B655C; font-size:13px; font-weight:600; cursor:pointer; font-family:'IBM Plex Sans', sans-serif;">{{ toggleLabel }}</button>
          </div>
        </div>

        <button type="submit" style="margin-top:8px; width:100%; padding:14px; background:#1C1A17; color:#FBF9F5; border:none; border-radius:12px; font-size:15px; font-weight:600; font-family:'IBM Plex Sans', sans-serif; cursor:pointer;" style-hover="{background:#332F29}">Log in</button>
      </form>

      <div style="display:flex; align-items:center; gap:14px; margin:26px 0;">
        <div style="flex:1; height:1px; background:#E7E1D6;"></div>
        <span style="font-size:12px; color:#A79F91; font-weight:500; letter-spacing:0.04em; text-transform:uppercase;">or continue with</span>
        <div style="flex:1; height:1px; background:#E7E1D6;"></div>
      </div>

      <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;">
        <button style="display:inline-flex; align-items:center; gap:8px; padding:11px 18px; background:#FFFFFF; border:1px solid #E7E1D6; border-radius:100px; font-size:14px; font-weight:600; color:#1C1A17; cursor:pointer; font-family:'IBM Plex Sans', sans-serif; transition:background 0.15s ease, border-color 0.15s ease;" style-hover="{background:#F7F4EE; borderColor:#D9CFBE}">
          <svg width="17" height="17" viewBox="0 0 18 18">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.259h2.908c1.702-1.567 2.684-3.874 2.684-6.617z"></path>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"></path>
            <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"></path>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"></path>
          </svg>
          Google
        </button>

        <sc-if value="{{ isIOS }}" hint-placeholder-val="{{ false }}">
          <button style="display:inline-flex; align-items:center; gap:8px; padding:11px 18px; background:#FFFFFF; border:1px solid #E7E1D6; border-radius:100px; font-size:14px; font-weight:600; color:#1C1A17; cursor:pointer; font-family:'IBM Plex Sans', sans-serif; transition:background 0.15s ease, border-color 0.15s ease;" style-hover="{background:#F7F4EE; borderColor:#D9CFBE}">
            <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#000000" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.32.03-1.74-.78-3.24-.78-1.51 0-1.97.76-3.22.8-1.29.05-2.27-1.34-3.1-2.57C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.5 1.28-.02 2.5.87 3.28.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"></path></svg>
            Apple
          </button>
        </sc-if>

        <button style="display:inline-flex; align-items:center; gap:8px; padding:11px 18px; background:#FFFFFF; border:1px solid #E7E1D6; border-radius:100px; font-size:14px; font-weight:600; color:#1C1A17; cursor:pointer; font-family:'IBM Plex Sans', sans-serif; transition:background 0.15s ease, border-color 0.15s ease;" style-hover="{background:#F7F4EE; borderColor:#D9CFBE}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="6.5" y="2" width="11" height="20" rx="3" stroke="#1C1A17" stroke-width="1.7"></rect><path d="M10.5 5h3" stroke="#1C1A17" stroke-width="1.7" stroke-linecap="round"></path><circle cx="12" cy="18.5" r="1" fill="#1C1A17"></circle></svg>
          Phone
        </button>

        <button style="display:inline-flex; align-items:center; gap:8px; padding:11px 18px; background:#FFFFFF; border:1px solid #E7E1D6; border-radius:100px; font-size:14px; font-weight:600; color:#1C1A17; cursor:pointer; font-family:'IBM Plex Sans', sans-serif; transition:background 0.15s ease, border-color 0.15s ease;" style-hover="{background:#F7F4EE; borderColor:#D9CFBE}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2.5" stroke="#1C1A17" stroke-width="1.7"></rect><path d="M4 7L12 13L20 7" stroke="#1C1A17" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          Email
        </button>
      </div>

    </div>

    <div style="margin-top:28px; font-size:14px; color:#6B655C;">
      Don't have an account? <a href="Signup.dc.html" style="color:#1C1A17; font-weight:600; text-decoration:none; border-bottom:1px solid #1C1A17;">Sign up</a>
    </div>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { showPassword: false, mounted: false, isIOS: false };

  componentDidMount() {
    requestAnimationFrame(() => this.setState({ mounted: true }));
    const ua = navigator.userAgent || '';
    const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    this.setState({ isIOS });
  }

  togglePassword = () => {
    this.setState(s => ({ showPassword: !s.showPassword }));
  };

  handleSubmit = (e) => {
    e.preventDefault();
  };

  renderVals() {
    return {
      passwordType: this.state.showPassword ? 'text' : 'password',
      toggleLabel: this.state.showPassword ? 'Hide' : 'Show',
      togglePassword: this.togglePassword,
      handleSubmit: this.handleSubmit,
      mountedOpacity: this.state.mounted ? 1 : 0,
      mountedTransform: this.state.mounted ? 'translateY(0)' : 'translateY(14px)',
      isIOS: this.state.isIOS,
      dots: Array.from({ length: 16 }, () => ({})),
    };
  }
}

</script>
</body>
</html>
