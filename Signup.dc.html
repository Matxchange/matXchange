<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; }
    * { box-sizing: border-box; }
    input::placeholder { color: #A79F91; }
    input:focus, select:focus { outline: none; }
  </style>
</helmet>

<div style="position:relative; min-height:100vh; width:100%; background: radial-gradient(circle at 88% -8%, rgba(217,164,65,0.20), transparent 42%), radial-gradient(circle at -8% 106%, rgba(138,90,46,0.12), transparent 40%), #FBF9F5; font-family:'IBM Plex Sans', sans-serif; overflow-x:hidden;">

  <!-- decorative motif: left (leaf in orbit) -->
  <div style="position:absolute; left:-40px; top:12%; z-index:0; pointer-events:none;">
    <div style="position:relative; width:180px; height:180px;">
      <div style="position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle at 45% 45%, rgba(95,138,90,0.15), transparent 62%);"></div>
      <div style="position:absolute; left:32px; top:32px; width:116px; height:116px; border-radius:50%; border:1.5px solid rgba(95,138,90,0.14);"></div>
      <svg width="58" height="58" viewBox="0 0 24 24" fill="none" style="position:absolute; left:61px; top:61px;"><path d="M12 21c-1.2-6.5 1-11.5 8.5-13.5C19.3 14.2 17 18.8 12 21z" fill="rgba(95,138,90,0.14)" stroke="#5F8A5A" stroke-width="1.4" stroke-linejoin="round"></path><path d="M12 21c0-4.3 1.6-8 5-10.2" stroke="#5F8A5A" stroke-width="1.4" stroke-linecap="round"></path></svg>
    </div>
  </div>

  <!-- decorative motif: right (circular-economy cycle) -->
  <div style="position:absolute; right:-50px; top:11%; z-index:0; pointer-events:none;">
    <div style="position:relative; width:220px; height:220px;">
      <div style="position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle at 55% 38%, rgba(217,164,65,0.16), transparent 62%);"></div>
      <div style="position:absolute; left:38px; top:38px; width:144px; height:144px; border-radius:50%; border:1.5px dashed rgba(138,90,46,0.18);"></div>
      <svg width="78" height="78" viewBox="0 0 24 24" fill="none" style="position:absolute; left:71px; top:71px;">
        <path d="M4.5 10a7.5 7.5 0 0 1 12.8-3.7L20 9" stroke="#5F8A5A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M20 4.6V9.2h-4.6" stroke="#5F8A5A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M19.5 14a7.5 7.5 0 0 1-12.8 3.7L4 15" stroke="#D9A441" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M4 19.4V14.8h4.6" stroke="#D9A441" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </div>
  </div>

  <!-- nav -->
  <div style="position:relative; z-index:1; display:flex; align-items:center; justify-content:space-between; padding: 24px 6vw;">
    <a href="Landing.dc.html" style="text-decoration:none; display:flex; align-items:center;">
      <img src="assets/mx-logo.png" alt="Matxchange" style="height:30px; width:auto; display:block;"></img>
    </a>
    <div style="font-size:14px; color:#6B655C;">Already have an account? <a href="Login.dc.html" style="color:#1C1A17; font-weight:600; text-decoration:none;">Log in</a></div>
  </div>

  <!-- content -->
  <div style="position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; padding: 12px 20px 60px;">

    <div style="text-align:center; margin-bottom:28px;">
      <h1 style="font-family:'Space Grotesk', sans-serif; font-size:clamp(24px,5vw,30px); font-weight:600; color:#1C1A17; margin:0; letter-spacing:-0.01em;">{{ headline }}</h1>
    </div>

    <!-- card -->
    <div style="width:100%; max-width:480px; background:#FFFFFF; border:1px solid #E7E1D6; border-radius:20px; box-shadow: 0 24px 60px -20px rgba(28,26,23,0.14); padding:clamp(24px,5vw,36px) clamp(20px,5vw,32px); overflow:hidden;">

      <!-- progress -->
      <sc-if value="{{ showProgress }}" hint-placeholder-val="{{ true }}">
        <div style="margin-bottom:26px;">
          <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:12px;">
            <sc-for list="{{ segments }}" as="seg" hint-placeholder-count="4">
              <div style="height:4px; border-radius:3px; background:{{ seg.color }}; transition:background 0.35s ease;"></div>
            </sc-for>
          </div>
          <div style="font-size:12.5px; font-weight:600; color:#A79F91; letter-spacing:0.03em; text-align:center;">Step {{ stepNumber }} of 4</div>
        </div>
      </sc-if>

      <div style="opacity:{{ enterOpacity }}; transform:{{ enterTransform }}; transition:opacity 0.38s ease, transform 0.38s ease;">

        <!-- STEP 1: contact -->
        <sc-if value="{{ isStep1 }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-bottom:20px;">
            <button type="button" style="display:inline-flex; align-items:center; gap:8px; padding:11px 18px; background:#FFFFFF; border:1px solid #E7E1D6; border-radius:100px; font-size:14px; font-weight:600; color:#1C1A17; cursor:pointer; font-family:'IBM Plex Sans', sans-serif; transition:background 0.15s ease, border-color 0.15s ease;" style-hover="{background:#F7F4EE; borderColor:#D9CFBE}">
              <svg width="17" height="17" viewBox="0 0 18 18">
                <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.259h2.908c1.702-1.567 2.684-3.874 2.684-6.617z"></path>
                <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"></path>
                <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"></path>
                <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"></path>
              </svg>
              Google
            </button>

            <sc-if value="{{ isIOS }}" hint-placeholder-val="{{ false }}">
              <button type="button" style="display:inline-flex; align-items:center; gap:8px; padding:11px 18px; background:#FFFFFF; border:1px solid #E7E1D6; border-radius:100px; font-size:14px; font-weight:600; color:#1C1A17; cursor:pointer; font-family:'IBM Plex Sans', sans-serif; transition:background 0.15s ease, border-color 0.15s ease;" style-hover="{background:#F7F4EE; borderColor:#D9CFBE}">
                <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#000000" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.32.03-1.74-.78-3.24-.78-1.51 0-1.97.76-3.22.8-1.29.05-2.27-1.34-3.1-2.57C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.5 1.28-.02 2.5.87 3.28.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"></path></svg>
                Apple
              </button>
            </sc-if>
          </div>
          <div style="display:flex; align-items:center; gap:14px; margin-bottom:20px;">
            <div style="flex:1; height:1px; background:#E7E1D6;"></div>
            <span style="font-size:12px; color:#A79F91; font-weight:500; letter-spacing:0.04em; text-transform:uppercase;">or with email</span>
            <div style="flex:1; height:1px; background:#E7E1D6;"></div>
          </div>

          <div style="display:flex; flex-direction:column; gap:16px;">
            <div>
              <label style="display:block; font-size:13px; font-weight:600; color:#1C1A17; margin-bottom:7px;">Full name</label>
              <input type="text" value="{{ formData.name }}" onChange="{{ setName }}" placeholder="Jane Wanjiru" style="width:100%; border:1px solid #E7E1D6; background:#F7F4EE; border-radius:12px; padding:13px 14px; font-size:15px; color:#1C1A17; font-family:'IBM Plex Sans', sans-serif;"></input>
            </div>
            <div>
              <label style="display:block; font-size:13px; font-weight:600; color:#1C1A17; margin-bottom:7px;">Email address</label>
              <input type="email" value="{{ formData.email }}" onChange="{{ setEmail }}" placeholder="jane@example.com" style="width:100%; border:1px solid #E7E1D6; background:#F7F4EE; border-radius:12px; padding:13px 14px; font-size:15px; color:#1C1A17; font-family:'IBM Plex Sans', sans-serif;"></input>
            </div>
            <div>
              <label style="display:block; font-size:13px; font-weight:600; color:#1C1A17; margin-bottom:7px;">Phone number</label>
              <input type="tel" value="{{ formData.phone }}" onChange="{{ setPhone }}" placeholder="+254 7XX XXX XXX" style="width:100%; border:1px solid #E7E1D6; background:#F7F4EE; border-radius:12px; padding:13px 14px; font-size:15px; color:#1C1A17; font-family:'IBM Plex Sans', sans-serif;"></input>
            </div>
          </div>
        </sc-if>

        <!-- STEP 2: company -->
        <sc-if value="{{ isStep2 }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex; flex-direction:column; gap:16px; min-height:180px;">
            <div>
              <label style="display:block; font-size:13px; font-weight:600; color:#1C1A17; margin-bottom:7px;">Company / Organization</label>
              <input type="text" value="{{ formData.company }}" onChange="{{ setCompany }}" placeholder="e.g. Nairobi Recyclers Ltd" style="width:100%; border:1px solid #E7E1D6; background:#F7F4EE; border-radius:12px; padding:13px 14px; font-size:15px; color:#1C1A17; font-family:'IBM Plex Sans', sans-serif;"></input>
              <div style="font-size:12.5px; color:#A79F91; margin-top:8px;">Operating solo? Just use your own name.</div>
            </div>
          </div>
        </sc-if>

        <!-- STEP 3: role -->
        <sc-if value="{{ isStep3 }}" hint-placeholder-val="{{ false }}">
          <div style="min-height:180px;">
            <label style="display:block; font-size:13px; font-weight:600; color:#1C1A17; margin-bottom:12px;">What best describes you?</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
              <sc-for list="{{ roles }}" as="role" hint-placeholder-count="4">
                <button type="button" onClick="{{ role.onClick }}" style="{{ role.style }}">
                  <span style="{{ role.dotStyle }}"></span>
                  {{ role.label }}
                </button>
              </sc-for>
            </div>
          </div>
        </sc-if>

        <!-- STEP 4: password -->
        <sc-if value="{{ isStep4 }}" hint-placeholder-val="{{ false }}">
          <div style="min-height:180px;">
            <label style="display:block; font-size:13px; font-weight:600; color:#1C1A17; margin-bottom:7px;">Create a password</label>
            <div style="display:flex; align-items:center; gap:10px; background:#F7F4EE; border:1px solid #E7E1D6; border-radius:12px; padding:13px 14px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;">
                <rect x="4" y="10" width="16" height="10" rx="2" stroke="#8A7F6E" stroke-width="1.6"></rect>
                <path d="M7.5 10V7.5a4.5 4.5 0 0 1 9 0V10" stroke="#8A7F6E" stroke-width="1.6"></path>
              </svg>
              <input type="{{ passwordType }}" value="{{ formData.password }}" onChange="{{ setPassword }}" placeholder="At least 8 characters" style="border:none; background:transparent; width:100%; font-size:15px; color:#1C1A17; font-family:'IBM Plex Sans', sans-serif;"></input>
              <button type="button" onClick="{{ togglePassword }}" style="border:none; background:transparent; color:#6B655C; font-size:13px; font-weight:600; cursor:pointer; font-family:'IBM Plex Sans', sans-serif;">{{ toggleLabel }}</button>
            </div>
            <div style="display:flex; flex-direction:column; gap:8px; margin-top:16px;">
              <sc-for list="{{ requirements }}" as="req" hint-placeholder-count="4">
                <div style="display:flex; align-items:center; gap:9px;">
                  <span style="{{ req.iconWrapStyle }}">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 13l5 5L19 7" stroke="{{ req.iconColor }}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                  </span>
                  <span style="{{ req.textStyle }}">{{ req.label }}</span>
                </div>
              </sc-for>
            </div>
          </div>
        </sc-if>

        <!-- STEP 5: confirmation -->
        <sc-if value="{{ isStep5 }}" hint-placeholder-val="{{ false }}">
          <div style="text-align:center; padding:12px 0 4px; min-height:180px;">
            <div style="width:64px; height:64px; border-radius:50%; background-image:linear-gradient(135deg,#8A5A2E,#D9A441); display:flex; align-items:center; justify-content:center; margin:0 auto 22px; transform:{{ confirmScale }}; transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M5 13l5 5L19 7" stroke="#FBF9F5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </div>
            <h2 style="font-family:'Space Grotesk', sans-serif; font-size:22px; font-weight:600; color:#1C1A17; margin:0 0 10px;">{{ confirmationHeadline }}</h2>
            <p style="font-size:14.5px; line-height:1.6; color:#6B655C; margin:0 0 8px; max-width:340px; margin-left:auto; margin-right:auto;">Your account is ready as a <strong style="color:#1C1A17;">{{ formData.role }}</strong>{{ confirmationCompanySuffix }}.</p>
          </div>
        </sc-if>

      </div>

      <!-- nav buttons -->
      <sc-if value="{{ showNavButtons }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex; gap:10px; margin-top:26px;">
          <sc-if value="{{ showBack }}" hint-placeholder-val="{{ false }}">
            <button type="button" onClick="{{ goBack }}" style="padding:14px 20px; background:#FFFFFF; color:#1C1A17; border:1px solid #E7E1D6; border-radius:12px; font-size:15px; font-weight:600; font-family:'IBM Plex Sans', sans-serif; cursor:pointer;" style-hover="{background:#F7F4EE}">Back</button>
          </sc-if>
          <button type="button" onClick="{{ primaryAction }}" style="flex:1; padding:14px; background:#1C1A17; color:#FBF9F5; border:none; border-radius:12px; font-size:15px; font-weight:600; font-family:'IBM Plex Sans', sans-serif; cursor:pointer;" style-hover="{background:#332F29}">{{ primaryLabel }}</button>
        </div>
      </sc-if>

      <sc-if value="{{ isStep5 }}" hint-placeholder-val="{{ false }}">
        <a href="Login.dc.html" style="margin-top:26px; display:block; text-align:center; padding:14px; background:#1C1A17; color:#FBF9F5; border-radius:12px; font-size:15px; font-weight:600; text-decoration:none;">Go to login</a>
      </sc-if>

    </div>

    <sc-if value="{{ showFooterLink }}" hint-placeholder-val="{{ true }}">
      <div style="margin-top:28px; font-size:14px; color:#6B655C;">
        Already have an account? <a href="Login.dc.html" style="color:#1C1A17; font-weight:600; text-decoration:none; border-bottom:1px solid #1C1A17;">Log in</a>
      </div>
    </sc-if>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    step: 1,
    entering: false,
    showPassword: false,
    isIOS: false,
    confirmScale: 0,
    formData: {
      name: '', email: '', phone: '', company: '', role: 'Waste Generator', password: '',
    },
  };

  componentDidMount() {
    const ua = navigator.userAgent || '';
    const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    this.setState({ isIOS });
  }

  componentDidUpdate(prevProps, prevState) {
    if (this.state.step === 5 && prevState.step !== 5) {
      requestAnimationFrame(() => requestAnimationFrame(() => this.setState({ confirmScale: 1 })));
    }
  }

  roleOptions = ['Waste Generator', 'Recycler', 'Aggregator', 'Buyer'];

  stepLabels = {
    1: 'Your details',
    2: 'Company',
    3: 'Account type',
    4: 'Password',
  };

  animateTo = (step) => {
    this.setState({ step, entering: true });
    requestAnimationFrame(() => {
      requestAnimationFrame(() => this.setState({ entering: false }));
    });
  };

  goNext = () => {
    if (this.state.step < 5) this.animateTo(this.state.step + 1);
  };

  goBack = () => {
    if (this.state.step > 1) this.animateTo(this.state.step - 1);
  };

  togglePassword = () => this.setState(s => ({ showPassword: !s.showPassword }));

  setField = (field) => (e) => {
    const value = e.target.value;
    this.setState(s => ({ formData: { ...s.formData, [field]: value } }));
  };

  selectRole = (role) => this.setState(s => ({ formData: { ...s.formData, role } }));

  baseBtnStyle = {
    display: 'flex', alignItems: 'center', gap: '9px', padding: '12px 14px',
    borderRadius: '11px', fontSize: '14px', fontWeight: 500,
    fontFamily: "'IBM Plex Sans', sans-serif", cursor: 'pointer', textAlign: 'left',
    transition: 'background 0.15s ease',
  };

  passwordStrength(pw) {
    if (!pw) return 0;
    let score = 0;
    if (pw.length >= 8) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    return score;
  }

  renderVals() {
    const { step, formData, entering } = this.state;
    const pw = formData.password || '';
    const reqChecks = [
      { label: 'At least 8 characters', met: pw.length >= 8 },
      { label: 'Upper & lowercase letters', met: /[A-Z]/.test(pw) && /[a-z]/.test(pw) },
      { label: 'At least one number', met: /[0-9]/.test(pw) },
      { label: 'At least one symbol', met: /[^A-Za-z0-9]/.test(pw) },
    ];
    const requirements = reqChecks.map((r) => ({
      label: r.label,
      iconColor: r.met ? '#FFFFFF' : '#A79F91',
      iconWrapStyle: {
        width: '15px', height: '15px', borderRadius: '50%', flexShrink: 0,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: r.met ? '#5F8A5A' : '#F0EBE0',
        transition: 'background 0.2s ease',
      },
      textStyle: { fontSize: '13px', color: r.met ? '#1C1A17' : '#A79F91', transition: 'color 0.2s ease' },
    }));

    const segments = [1, 2, 3, 4].map((n) => ({
      color: n <= step ? '#1C1A17' : '#E7E1D6',
    }));

    const roles = this.roleOptions.map((label) => {
      const selected = label === formData.role;
      return {
        label,
        onClick: () => this.selectRole(label),
        style: {
          ...this.baseBtnStyle,
          background: selected ? '#FBF3E6' : '#FFFFFF',
          border: selected ? '1.5px solid #D9A441' : '1.5px solid #E7E1D6',
          color: '#1C1A17',
        },
        dotStyle: {
          width: '8px', height: '8px', borderRadius: '50%', flexShrink: 0,
          background: selected ? 'linear-gradient(135deg,#8A5A2E,#D9A441)' : '#D8D2C4',
        },
      };
    });

    const headlines = {
      1: 'Create your Matxchange account',
      2: 'Tell us where you work',
      3: 'Choose your role',
      4: 'Secure your account',
      5: 'You\u2019re all set',
    };

    return {
      headline: headlines[step],
      showProgress: step < 5,
      stepNumber: step,
      stepLabel: this.stepLabels[step] || '',
      segments,
      isStep1: step === 1, isStep2: step === 2, isStep3: step === 3, isStep4: step === 4, isStep5: step === 5,
      enterOpacity: entering ? 0 : 1,
      enterTransform: entering ? 'translateX(14px)' : 'translateX(0)',
      formData,
      setName: this.setField('name'),
      setEmail: this.setField('email'),
      setPhone: this.setField('phone'),
      setCompany: this.setField('company'),
      setPassword: this.setField('password'),
      roles,
      passwordType: this.state.showPassword ? 'text' : 'password',
      toggleLabel: this.state.showPassword ? 'Hide' : 'Show',
      togglePassword: this.togglePassword,
      requirements,
      isIOS: this.state.isIOS,
      dots: Array.from({ length: 16 }, () => ({})),
      confirmScale: this.state.confirmScale === 1 ? 'scale(1)' : 'scale(0.4)',
      showNavButtons: step < 5,
      showBack: step > 1,
      goBack: this.goBack,
      primaryAction: step === 4 ? this.goNext : this.goNext,
      primaryLabel: step === 4 ? 'Create account' : 'Continue',
      confirmationHeadline: formData.name ? `Welcome, ${formData.name.split(' ')[0]}!` : 'Welcome to Matxchange!',
      confirmationCompanySuffix: formData.company ? ` at ${formData.company}` : '',
      showFooterLink: step < 5,
    };
  }
}

</script>
</body>
</html>
