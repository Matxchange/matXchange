<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; }
    * { box-sizing: border-box; }
    input::placeholder { color: #A79F91; }
    input:focus { outline: none; }
  </style>
</helmet>

<div style="position:relative; min-height:100vh; width:100%; background: radial-gradient(circle at 88% -8%, rgba(217,164,65,0.20), transparent 42%), radial-gradient(circle at -8% 106%, rgba(138,90,46,0.12), transparent 40%), #FBF9F5; font-family:'IBM Plex Sans', sans-serif; overflow-x:hidden;">

  <!-- decorative motif: left (circular-economy cycle) -->
  <div style="position:absolute; left:-50px; top:18%; z-index:0; pointer-events:none;">
    <div style="position:relative; width:220px; height:220px;">
      <div style="position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle at 42% 38%, rgba(95,138,90,0.16), transparent 62%);"></div>
      <div style="position:absolute; left:38px; top:38px; width:144px; height:144px; border-radius:50%; border:1.5px dashed rgba(138,90,46,0.18);"></div>
      <svg width="78" height="78" viewBox="0 0 24 24" fill="none" style="position:absolute; left:71px; top:71px;">
        <path d="M4.5 10a7.5 7.5 0 0 1 12.8-3.7L20 9" stroke="#5F8A5A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M20 4.6V9.2h-4.6" stroke="#5F8A5A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M19.5 14a7.5 7.5 0 0 1-12.8 3.7L4 15" stroke="#D9A441" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M4 19.4V14.8h4.6" stroke="#D9A441" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </div>
  </div>

  <!-- decorative motif: right (leaf in orbit) -->
  <div style="position:absolute; right:-40px; top:56%; z-index:0; pointer-events:none;">
    <div style="position:relative; width:180px; height:180px;">
      <div style="position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle at 55% 45%, rgba(217,164,65,0.15), transparent 62%);"></div>
      <div style="position:absolute; left:32px; top:32px; width:116px; height:116px; border-radius:50%; border:1.5px solid rgba(95,138,90,0.14);"></div>
      <svg width="58" height="58" viewBox="0 0 24 24" fill="none" style="position:absolute; left:61px; top:61px;"><path d="M12 21c-1.2-6.5 1-11.5 8.5-13.5C19.3 14.2 17 18.8 12 21z" fill="rgba(95,138,90,0.14)" stroke="#5F8A5A" stroke-width="1.4" stroke-linejoin="round"></path><path d="M12 21c0-4.3 1.6-8 5-10.2" stroke="#5F8A5A" stroke-width="1.4" stroke-linecap="round"></path></svg>
    </div>
  </div>

  <!-- nav -->
  <div style="position:relative; z-index:1; display:flex; align-items:center; justify-content:space-between; padding: 24px 6vw;">
    <a href="Landing.dc.html" style="text-decoration:none; display:flex; align-items:center;">
      <img src="assets/mx-logo.png" alt="Matxchange" style="height:30px; width:auto; display:block;"></img>
    </a>
    <div style="font-size:14px; color:#6B655C;">Remembered it? <a href="Login.dc.html" style="color:#1C1A17; font-weight:600; text-decoration:none;">Log in</a></div>
  </div>

  <!-- content -->
  <div style="position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 78px); padding: 24px 20px 60px; opacity:{{ mountedOpacity }}; transform:{{ mountedTransform }}; transition:opacity 0.6s ease, transform 0.6s ease;">

    <!-- request state -->
    <sc-if value="{{ showForm }}" hint-placeholder-val="{{ true }}">
      <div style="text-align:center; margin-bottom:32px;">
        <h1 style="font-family:'Space Grotesk', sans-serif; font-size:clamp(28px,5.5vw,36px); font-weight:600; color:#1C1A17; margin:0 0 8px; letter-spacing:-0.02em;">Reset your password</h1>
        <div style="font-size:15px; color:#6B655C; max-width:340px; line-height:1.5;">Enter the email on your account and we'll send you a link to reset it.</div>
      </div>

      <div style="width:100%; max-width:440px; background:#FFFFFF; border:1px solid #E7E1D6; border-radius:20px; box-shadow: 0 24px 60px -20px rgba(28,26,23,0.14); padding:clamp(24px,5vw,36px) clamp(20px,5vw,32px);">
        <form style="display:flex; flex-direction:column; gap:18px;" onSubmit="{{ handleSubmit }}">
          <div>
            <label style="display:block; font-size:13px; font-weight:600; color:#1C1A17; margin-bottom:7px;">Email address</label>
            <div style="display:flex; align-items:center; gap:10px; background:#F7F4EE; border:1px solid #E7E1D6; border-radius:12px; padding:13px 14px;">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;">
                <rect x="3" y="5" width="18" height="14" rx="2" stroke="#8A7F6E" stroke-width="1.6"></rect>
                <path d="M4 6.5L12 13L20 6.5" stroke="#8A7F6E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
              <input type="email" value="{{ email }}" onChange="{{ setEmail }}" placeholder="jane@example.com" style="border:none; background:transparent; width:100%; font-size:15px; color:#1C1A17; font-family:'IBM Plex Sans', sans-serif;"></input>
            </div>
          </div>

          <button type="submit" style="width:100%; padding:14px; background:#1C1A17; color:#FBF9F5; border:none; border-radius:12px; font-size:15px; font-weight:600; font-family:'IBM Plex Sans', sans-serif; cursor:pointer;" style-hover="{background:#332F29}">Send reset link</button>
        </form>
      </div>

    </sc-if>

    <!-- sent state -->
    <sc-if value="{{ showSent }}" hint-placeholder-val="{{ false }}">
      <div style="width:100%; max-width:440px; background:#FFFFFF; border:1px solid #E7E1D6; border-radius:20px; box-shadow: 0 24px 60px -20px rgba(28,26,23,0.14); padding:clamp(32px,6vw,44px) clamp(24px,5vw,36px); text-align:center;">
        <div style="width:56px; height:56px; border-radius:50%; background-image:linear-gradient(135deg,#8A5A2E,#D9A441); display:flex; align-items:center; justify-content:center; margin:0 auto 22px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="#FBF9F5" stroke-width="1.8"></rect><path d="M4 6.5L12 13L20 6.5" stroke="#FBF9F5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        </div>
        <h1 style="font-family:'Space Grotesk', sans-serif; font-size:24px; font-weight:600; color:#1C1A17; margin:0 0 12px; letter-spacing:-0.01em;">Check your email</h1>
        <p style="font-size:14.5px; line-height:1.6; color:#6B655C; margin:0 0 26px;">We've sent a password reset link to <strong style="color:#1C1A17;">{{ email }}</strong>. It expires in 30 minutes.</p>
        <button type="button" onClick="{{ resend }}" style="width:100%; padding:14px; background:#1C1A17; color:#FBF9F5; border:none; border-radius:12px; font-size:15px; font-weight:600; font-family:'IBM Plex Sans', sans-serif; cursor:pointer; margin-bottom:12px;" style-hover="{background:#332F29}">Resend email</button>
        <a href="Login.dc.html" style="display:block; font-size:14px; color:#8A5A2E; text-decoration:none; font-weight:600;">Back to login</a>
      </div>
    </sc-if>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { email: '', sent: false, mounted: false };

  componentDidMount() {
    requestAnimationFrame(() => this.setState({ mounted: true }));
  }

  setEmail = (e) => this.setState({ email: e.target.value });

  handleSubmit = (e) => {
    e.preventDefault();
    if (this.state.email) this.setState({ sent: true });
  };

  resend = () => {};

  renderVals() {
    return {
      email: this.state.email,
      setEmail: this.setEmail,
      handleSubmit: this.handleSubmit,
      resend: this.resend,
      showForm: !this.state.sent,
      showSent: this.state.sent,
      mountedOpacity: this.state.mounted ? 1 : 0,
      mountedTransform: this.state.mounted ? 'translateY(0)' : 'translateY(14px)',
    };
  }
}

</script>
</body>
</html>
